<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบวิเคราะห์หนี้คงค้าง</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.11.5/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    /* ใส่ CSS ทั้งหมดจากเดิม */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }
    
    /* ... ใส่ CSS ทั้งหมดจาก index.html เดิม ... */
    .container-fluid {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .header {
      background: white;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      animation: slideDown 0.5s ease;
    }
    
    .header h1 {
      color: #667eea;
      font-size: 28px;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }
    
    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }
    
    .stat-card .stat-icon {
      font-size: 40px;
      margin-bottom: 15px;
    }
    
    .stat-card .stat-value {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .stat-card .stat-label {
      color: #666;
      font-size: 14px;
    }
    
    .stat-card.warning {
      border-left: 4px solid #ffc107;
    }
    
    .stat-card.danger {
      border-left: 4px solid #dc3545;
    }
    
    .stat-card.success {
      border-left: 4px solid #28a745;
    }
    
    .stat-card.info {
      border-left: 4px solid #17a2b8;
    }
    
    .alert-section {
      background: white;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }
    
    .alert-item {
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border-left: 4px solid;
      transition: all 0.3s ease;
    }
    
    .alert-item:hover {
      transform: translateX(5px);
    }
    
    .alert-danger {
      background: #fee;
      border-left-color: #dc3545;
    }
    
    .alert-warning {
      background: #ffe6cc;
      border-left-color: #ffc107;
    }
    
    .table-section {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }
    
    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .search-box {
      position: relative;
    }
    
    .search-box input {
      padding: 10px 35px 10px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 25px;
      width: 300px;
      transition: all 0.3s ease;
    }
    
    .search-box input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }
    
    .search-box i {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
    }
    
    .btn-export {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 25px;
      transition: all 0.3s ease;
    }
    
    .btn-export:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102,126,234,0.4);
    }
    
    .branch-card {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 10px;
      transition: all 0.3s ease;
    }
    
    .branch-card:hover {
      background: #e9ecef;
    }
    
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .badge-debt {
      background: #dc3545;
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
    }
    
    .badge-credit {
      background: #28a745;
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
    }
    
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      display: none;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }
      
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      .search-box input {
        width: 100%;
      }
      
      .table-header {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
  </div>
  
  <div class="container-fluid">
    <!-- Header -->
    <div class="header">
      <h1>
        <i class="fas fa-chart-line"></i>
        ระบบวิเคราะห์หนี้คงค้างลูกค้า
      </h1>
      <small class="text-muted">Last Updated: <span id="lastUpdate">-</span></small>
    </div>
    
    <!-- Stats Cards -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card info">
        <div class="stat-icon"><i class="fas fa-users"></i></div>
        <div class="stat-value" id="totalCustomers">0</div>
        <div class="stat-label">จำนวนลูกค้าทั้งหมด</div>
      </div>
      <div class="stat-card warning">
        <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
        <div class="stat-value" id="totalBalance">0</div>
        <div class="stat-label">ยอดคงเหลือรวม</div>
      </div>
      <div class="stat-card danger">
        <div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="stat-value" id="totalOverdue">0</div>
        <div class="stat-label">ยอดค้างชำระรวม</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-clock"></i></div>
        <div class="stat-value" id="customersWithDebt">0</div>
        <div class="stat-label">ลูกค้าที่มีหนี้</div>
      </div>
    </div>
    
    <!-- Alert Section -->
    <div class="alert-section" id="alertSection">
      <h5><i class="fas fa-bell"></i> การแจ้งเตือน</h5>
      <div id="alerts"></div>
    </div>
    
    <!-- Branch Summary -->
    <div class="alert-section branch-summary" id="branchSummary">
      <h5><i class="fas fa-store"></i> สรุปตามสาขา</h5>
      <div id="branchCards"></div>
    </div>
    
    <!-- Table Section -->
    <div class="table-section">
      <div class="table-header">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="ค้นหาชื่อลูกค้า รหัสลูกค้า...">
          <i class="fas fa-search"></i>
        </div>
        <div>
          <button class="btn-export" onclick="exportData()">
            <i class="fas fa-download"></i> Export Data
          </button>
        </div>
      </div>
      <div class="table-responsive">
        <table id="dataTable" class="table table-hover" style="width:100%">
          <thead>
            <tr>
              <th>รหัสลูกค้า</th>
              <th>ชื่อลูกค้า</th>
              <th>สาขา</th>
              <th>พื้นที่</th>
              <th>ยอดคงเหลือ</th>
              <th>ค้างชำระ</th>
              <th>1 วัน</th>
              <th>2 วัน</th>
              <th>3 วัน</th>
              <th>7-30 วัน</th>
              <th>เกิน 30 วัน</th>
              <th>สถานะ</th>
            </tr>
          </thead>
          <tbody id="tableBody">
          </tbody>
        </table>
      </div>
    </div>
  </div>
  
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap5.min.js"></script>
  <script>
    // กำหนด URL ของ Google Apps Script Web App
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwA7MzcEy6DKirevQdBFWLOzKaxboATV1A_MkdgnoZUaiSjtU5_LXRGm5M9OgF38EVT/exec';
    let allData = [];
    let dataTable;
    
    // Format number with commas
    function formatNumber(num) {
      if (num === undefined || num === null) return '0';
      return num.toString().replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1,');
    }
    
    // Load data from Google Apps Script via fetch API
    async function loadData() {
      showLoading();
      try {
        const response = await fetch(GAS_URL + '?action=getData');
        const result = await response.json();
        
        if (result.success) {
          allData = result.data;
          updateStats(result.summary);
          updateAlerts(result.data);
          updateBranchSummary(result.branchSummary);
          renderTable(allData);
          updateLastUpdate();
        } else {
          showError('Error loading data: ' + result.error);
        }
      } catch (error) {
        showError('Error: ' + error.message);
      }
      hideLoading();
    }
    
    function updateStats(summary) {
      $('#totalCustomers').text(formatNumber(summary.totalCustomers));
      $('#totalBalance').text(formatNumber(summary.totalBalance));
      $('#totalOverdue').text(formatNumber(Math.abs(summary.totalOverdue)));
      $('#customersWithDebt').text(formatNumber(summary.customersWithDebt));
    }
    
    function updateAlerts(data) {
      const highRiskCustomers = data.filter(c => (c.over30Days || 0) < -1000000);
      const overdueCustomers = data.filter(c => (c.overdue || 0) < 0);
      const urgentCustomers = data.filter(c => (c.days7to30 || 0) < -500000);
      const summary = {
        totalOverdue: data.reduce((sum, c) => sum + (c.overdue || 0), 0)
      };
      
      let alertsHtml = '';
      
      if (highRiskCustomers.length > 0) {
        alertsHtml += `
          <div class="alert-item alert-danger">
            <i class="fas fa-skull-crosswalk"></i> 
            <strong>⚠️ 高风险ลูกค้า!</strong> มี ${highRiskCustomers.length} ราย ที่มียอดค้างเกิน 30 วัน มากกว่า 1,000,000 บาท
            <div class="mt-2">
              ${highRiskCustomers.slice(0, 3).map(c => `- ${c.customerName}: ${formatNumber(Math.abs(c.over30Days))} บาท`).join('<br>')}
            </div>
          </div>
        `;
      }
      
      if (urgentCustomers.length > 0) {
        alertsHtml += `
          <div class="alert-item alert-warning">
            <i class="fas fa-clock"></i> 
            <strong>📢 ต้องติดตาม!</strong> มี ${urgentCustomers.length} ราย ที่มียอดค้าง 7-30 วัน มากกว่า 500,000 บาท
          </div>
        `;
      }
      
      if (overdueCustomers.length > 0) {
        alertsHtml += `
          <div class="alert-item">
            <i class="fas fa-chart-line"></i> 
            <strong>💰 สรุปหนี้ค้าง:</strong> มีลูกค้าทั้งหมด ${overdueCustomers.length} ราย ที่มียอดค้างชำระ รวม ${formatNumber(Math.abs(summary.totalOverdue))} บาท
          </div>
        `;
      }
      
      if (alertsHtml === '') {
        alertsHtml = '<div class="alert-item"><i class="fas fa-check-circle"></i> ไม่มีการแจ้งเตือนในขณะนี้</div>';
      }
      
      $('#alerts').html(alertsHtml);
    }
    
    function updateBranchSummary(branchSummary) {
      let html = '<div class="row">';
      for (const [branch, data] of Object.entries(branchSummary)) {
        if (branch !== 'N/A') {
          const balanceColor = data.totalBalance < 0 ? 'text-danger' : 'text-success';
          html += `
            <div class="col-md-3 col-sm-6">
              <div class="branch-card">
                <strong><i class="fas fa-store"></i> ${branch}</strong><br>
                <small class="text-muted">พื้นที่: ${data.area}</small><br>
                <small>ลูกค้า: ${data.customers} ราย</small><br>
                <small class="${balanceColor}">ยอดคงเหลือ: ${formatNumber(data.totalBalance)}</small><br>
                <small class="text-danger">หนี้ค้าง: ${formatNumber(Math.abs(data.totalOverdue))}</small>
              </div>
            </div>
          `;
        }
      }
      html += '</div>';
      $('#branchCards').html(html);
    }
    
    function renderTable(data) {
      const tableBody = $('#tableBody');
      tableBody.empty();
      
      data.forEach(row => {
        const balance = row.balance || 0;
        const status = balance < 0 ? '<span class="badge-debt">มีหนี้</span>' : '<span class="badge-credit">เครดิต</span>';
        const balanceClass = balance < 0 ? 'text-danger' : 'text-success';
        
        const tr = `
          <tr>
            <td>${row.customerCode || '-'}</td>
            <td>${row.customerName || '-'}</td>
            <td>${row.branch || '-'}</td>
            <td>${row.area || '-'}</td>
            <td class="${balanceClass} fw-bold">${formatNumber(balance)}</td>
            <td class="text-danger">${formatNumber(Math.abs(row.overdue || 0))}</td>
            <td>${formatNumber(Math.abs(row.day1 || 0))}</td>
            <td>${formatNumber(Math.abs(row.day2 || 0))}</td>
            <td>${formatNumber(Math.abs(row.day3 || 0))}</td>
            <td>${formatNumber(Math.abs(row.days7to30 || 0))}</td>
            <td class="text-danger fw-bold">${formatNumber(Math.abs(row.over30Days || 0))}</td>
            <td>${status}</td>
          </tr>
        `;
        tableBody.append(tr);
      });
      
      // Initialize DataTable if not exists
      if ($.fn.dataTable.isDataTable('#dataTable')) {
        dataTable.destroy();
      }
      
      dataTable = $('#dataTable').DataTable({
        pageLength: 25,
        order: [[4, 'asc']],
        language: {
          search: "",
          lengthMenu: "แสดง _MENU_ รายการ",
          info: "แสดง _START_ ถึง _END_ จาก _TOTAL_ รายการ",
          paginate: {
            first: "แรก",
            last: "สุดท้าย",
            next: "ถัดไป",
            previous: "ก่อนหน้า"
          }
        }
      });
      
      // Custom search
      $('#searchInput').on('keyup', function() {
        dataTable.search(this.value).draw();
      });
    }
    
    async function exportData() {
      if (confirm('ต้องการ export ข้อมูลใช่หรือไม่?')) {
        showLoading();
        try {
          const response = await fetch(GAS_URL + '?action=export', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ data: allData })
          });
          const result = await response.json();
          
          if (result.success) {
            alert('Export สำเร็จ! ไฟล์ถูกบันทึกใน Google Sheet: ' + result.sheetName);
          } else {
            alert('Export ล้มเหลว: ' + result.error);
          }
        } catch (error) {
          alert('Export Error: ' + error.message);
        }
        hideLoading();
      }
    }
    
    function updateLastUpdate() {
      const now = new Date();
      $('#lastUpdate').text(now.toLocaleString('th-TH'));
    }
    
    function showLoading() {
      $('#loading').fadeIn();
    }
    
    function hideLoading() {
      $('#loading').fadeOut();
    }
    
    function showError(message) {
      alert(message);
    }
    
    // Load data on page load
    $(document).ready(function() {
      loadData();
    });
  </script>
</body>
</html>
