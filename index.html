<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Farm | Debt Management Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #27ae60; }
        body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; }
        .navbar { background: var(--primary-color) !important; color: white; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.07); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .stat-icon { font-size: 2rem; opacity: 0.3; position: absolute; right: 20px; top: 20px; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .badge-overdue { background-color: #e74c3c; }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">
    <div class="text-center">
        <div class="spinner-border text-success" role="status"></div>
        <p class="mt-2">Fetching Real-time Data...</p>
    </div>
</div>

<nav class="navbar navbar-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1"><i class="fa-solid fa-chart-line me-2"></i> Northern Farm Credit Analysis</span>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card p-3 bg-white border-start border-primary border-4">
                <i class="fa-solid fa-file-invoice-dollar stat-icon text-primary"></i>
                <small class="text-muted fw-bold">TOTAL BALANCE</small>
                <h2 id="sumBalance" class="mb-0">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 bg-white border-start border-danger border-4">
                <i class="fa-solid fa-clock-rotate-left stat-icon text-danger"></i>
                <small class="text-muted fw-bold">OVERDUE (> 0 Days)</small>
                <h2 id="sumOverdue" class="text-danger mb-0">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 bg-white border-start border-warning border-4">
                <i class="fa-solid fa-triangle-exclamation stat-icon text-warning"></i>
                <small class="text-muted fw-bold">CRITICAL (> 30 Days)</small>
                <h2 id="sumCritical" class="text-warning mb-0">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 bg-white border-start border-success border-4">
                <i class="fa-solid fa-location-dot stat-icon text-success"></i>
                <small class="text-muted fw-bold">ACTIVE BRANCHES</small>
                <h2 id="branchCount" class="mb-0 text-success">0</h2>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-lg-8">
            <div class="card p-4 h-100">
                <h5 class="mb-3">Debt Structure by Branch</h5>
                <canvas id="mainChart" style="max-height: 300px;"></canvas>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card p-4 h-100 text-center">
                <h5 class="mb-3">Overdue Ratio</h5>
                <canvas id="ratioChart" style="max-height: 300px;"></canvas>
            </div>
        </div>
    </div>

    <div class="card p-4 mb-5">
        <div class="table-responsive">
            <table id="dataTable" class="table table-hover align-middle w-100">
                <thead class="table-light">
                    <tr>
                        <th>Branch</th>
                        <th>Area</th>
                        <th>Customer Name</th>
                        <th class="text-end">Total Balance</th>
                        <th class="text-end">Overdue</th>
                        <th class="text-end">Over 30D</th>
                        <th>Last Update</th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.print.min.js"></script>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwA7MzcEy6DKirevQdBFWLOzKaxboATV1A_MkdgnoZUaiSjtU5_LXRGm5M9OgF38EVT/exec';

    async function init() {
        try {
            const res = await fetch(API_URL, { redirect: 'follow' });
            const data = await res.json();
            
            processDashboard(data);
            renderTable(data);
            renderCharts(data);
            
            document.getElementById('loader').style.display = 'none';
        } catch (err) {
            console.error(err);
            alert('Error loading data. Please check CORS or Web App permissions.');
        }
    }

    function processDashboard(data) {
        const total = data.reduce((s, v) => s + Number(v.total || 0), 0);
        const overdue = data.reduce((s, v) => s + Number(v.overdue || 0), 0);
        const critical = data.reduce((s, v) => s + Number(v.overdueOver30 || 0), 0);
        const branches = new Set(data.map(v => v.branch)).size;

        document.getElementById('sumBalance').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('sumOverdue').innerText = overdue.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('sumCritical').innerText = critical.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('branchCount').innerText = branches;
    }

    function renderTable(data) {
        $('#dataTable').DataTable({
            data: data,
            columns: [
                { data: 'branch' },
                { data: 'area' },
                { data: 'customerName', render: (d, t, r) => `<b>${d}</b><br><small class='text-muted'>${r.customerCode}</small>` },
                { data: 'total', className: 'text-end', render: $.fn.dataTable.render.number(',', '.', 2) },
                { data: 'overdue', className: 'text-end text-danger', render: $.fn.dataTable.render.number(',', '.', 2) },
                { data: 'overdueOver30', className: 'text-end fw-bold', render: $.fn.dataTable.render.number(',', '.', 2) },
                { data: 'lastUpdate', render: d => d === "N/A" ? "-" : d }
            ],
            dom: 'Bfrtip',
            buttons: ['copy', 'excel', 'print'],
            pageLength: 10,
            order: [[4, 'desc']]
        });
    }

    function renderCharts(data) {
        // Bar Chart
        const branches = [...new Set(data.map(d => d.branch))];
        const branchData = branches.map(b => 
            data.filter(d => d.branch === b).reduce((s, v) => s + Number(v.total), 0)
        );

        new Chart(document.getElementById('mainChart'), {
            type: 'bar',
            data: {
                labels: branches,
                datasets: [{
                    label: 'Balance by Branch',
                    data: branchData,
                    backgroundColor: '#3498db'
                }]
            }
        });

        // Pie Chart
        const totalDebt = data.reduce((s, v) => s + Number(v.total), 0);
        const totalOverdue = data.reduce((s, v) => s + Number(v.overdue), 0);

        new Chart(document.getElementById('ratioChart'), {
            type: 'doughnut',
            data: {
                labels: ['Normal', 'Overdue'],
                datasets: [{
                    data: [totalDebt - totalOverdue, totalOverdue],
                    backgroundColor: ['#2ecc71', '#e74c3c']
                }]
            }
        });
    }

    init();
</script>
</body>
</html>
