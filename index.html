<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debt Analysis Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.bootstrap5.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .stat-card { border-left: 5px solid #0d6efd; }
        .nav-brand { font-weight: bold; color: #0d6efd !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-light bg-white shadow-sm mb-4">
    <div class="container-fluid">
        <a class="navbar-brand nav-brand" href="#">Debt Management System</a>
    </div>
</nav>

<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card stat-card p-3">
                <small class="text-muted">Total Balance</small>
                <h3 id="totalBalance">0.00</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card p-3" style="border-left-color: #dc3545;">
                <small class="text-muted">Total Overdue</small>
                <h3 id="totalOverdue" class="text-danger">0.00</h3>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-3">
                <canvas id="debtChart" height="80"></canvas>
            </div>
        </div>
    </div>

    <div class="card p-4">
        <div class="table-responsive">
            <table id="debtTable" class="table table-hover w-100">
                <thead class="table-light">
                    <tr>
                        <th>Branch</th>
                        <th>Area</th>
                        <th>Customer</th>
                        <th>Total Debt</th>
                        <th>Undue</th>
                        <th>Overdue</th>
                        <th>Over 30 Days</th>
                        <th>Last Update</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.3/jszip.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.print.min.js"></script>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwA7MzcEy6DKirevQdBFWLOzKaxboATV1A_MkdgnoZUaiSjtU5_LXRGm5M9OgF38EVT/exec';

    async function fetchData() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            updateDashboard(data);
            renderTable(data);
            renderChart(data);
        } catch (error) {
            console.error('Error:', error);
            alert('Failed to load data.');
        }
    }

    function updateDashboard(data) {
        let total = data.reduce((sum, row) => sum + parseFloat(row.total || 0), 0);
        let overdue = data.reduce((sum, row) => sum + parseFloat(row.overdue || 0), 0);
        document.getElementById('totalBalance').innerText = total.toLocaleString();
        document.getElementById('totalOverdue').innerText = overdue.toLocaleString();
    }

    function renderTable(data) {
        $('#debtTable').DataTable({
            data: data,
            columns: [
                { data: 'branch' },
                { data: 'area' },
                { data: 'customerName' },
                { data: 'total', render: $.fn.dataTable.render.number(',', '.', 2) },
                { data: 'undue', render: $.fn.dataTable.render.number(',', '.', 2) },
                { data: 'overdue', render: $.fn.dataTable.render.number(',', '.', 2) },
                { data: 'overdueOver30', render: $.fn.dataTable.render.number(',', '.', 2) },
                { data: 'lastUpdate' }
            ],
            dom: 'Bfrtip',
            buttons: ['copy', 'excel', 'print'],
            order: [[5, 'desc']] // Sort by Overdue by default
        });
    }

    function renderChart(data) {
        const ctx = document.getElementById('debtChart').getContext('2d');
        const branchNames = [...new Set(data.map(d => d.branch))];
        const debtByBranch = branchNames.map(b => 
            data.filter(d => d.branch === b).reduce((s, r) => s + parseFloat(r.total), 0)
        );

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: branchNames,
                datasets: [{
                    label: 'Total Debt by Branch',
                    data: debtByBranch,
                    backgroundColor: '#0d6efd'
                }]
            },
            options: { responsive: true }
        });
    }

    fetchData();
</script>
</body>
</html>
