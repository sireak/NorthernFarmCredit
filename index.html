<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Northern Farm | Executive Credit Intelligence</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --corp-navy: #0f172a; 
            --corp-blue: #2563eb; 
            --corp-red: #dc2626; 
            --corp-gray-bg: #f8fafc;
            --corp-border: #e2e8f0;
        }
        body { background-color: var(--corp-gray-bg); font-family: 'Inter', sans-serif; color: #334155; }
        
        /* Top Navigation */
        .navbar { background: var(--corp-navy); padding: 1rem 1.5rem; }
        .brand-title { letter-spacing: 0.5px; }

        /* Card & Containers */
        .card-main { border: 1px solid var(--corp-border); border-radius: 8px; background: #fff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        
        /* Enterprise Table Styling */
        table.dataTable { border-collapse: collapse !important; width: 100% !important; margin-top: 0 !important; }
        .table > :not(caption) > * > * { padding: 14px 16px; border-bottom: 1px solid var(--corp-border); border-right: none; border-left: none; }
        
        /* Table Headers */
        .table thead th { 
            background-color: #f1f5f9; 
            color: #475569; 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 0.8px; 
            font-weight: 600; 
            border-bottom: 2px solid #cbd5e1 !important;
            white-space: nowrap;
        }
        
        /* Highlight Specific Columns */
        .col-overdue { background-color: #fef2f2 !important; color: var(--corp-red); font-weight: 600; }
        .col-aging-high { background-color: #fff1f2 !important; color: #9f1239; font-weight: 700; }
        .col-aging-mid { background-color: #eff6ff !important; color: #1d4ed8; }
        
        /* Modal Polish */
        .modal-content { border: none; border-radius: 0; }
        .modal-header { background-color: #fff; border-bottom: 1px solid var(--corp-border); }
        .modal-title { font-weight: 600; color: var(--corp-navy); }
        
        /* Zero Value Formatting */
        .text-zero { color: #cbd5e1; font-weight: 400; }
        .text-negative { color: #16a34a; } /* สีเขียวสำหรับยอดติดลบ (ถ้าเป็นยอดเครดิต/จ่ายเกิน) */

        /* Fix DataTable inside Modal */
        .dataTables_scrollHeadInner, .table { width: 100% !important; }
        .dataTables_wrapper .row { margin: 0; padding: 12px 16px; align-items: center; }
        .dataTables_filter input { border: 1px solid var(--corp-border); border-radius: 4px; padding: 4px 12px; }
        .dataTables_filter input:focus { outline: none; border-color: var(--corp-blue); box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }
        
        .loader-overlay { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loader" class="loader-overlay">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-3 fw-medium text-muted small">INITIALIZING DATA...</div>
</div>

<nav class="navbar navbar-dark mb-4">
    <div class="container-fluid px-4">
        <span class="navbar-brand d-flex align-items-center">
            <i class="fa-solid fa-chart-pie me-3 text-info fs-5"></i>
            <div>
                <div class="fw-bold fs-5 brand-title lh-1">Northern Farm</div>
                <small class="opacity-75" style="font-size: 0.65rem; letter-spacing: 1px;">CREDIT PORTFOLIO MANAGEMENT</small>
            </div>
        </span>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="card card-main mb-5">
        <div class="px-4 py-3 border-bottom d-flex justify-content-between align-items-center bg-white">
            <h6 class="mb-0 fw-bold text-secondary" style="letter-spacing: 0.5px;">BRANCH PERFORMANCE OVERVIEW</h6>
            <div id="exportBtns"></div>
        </div>
        <div class="p-0">
            <table id="branchTable" class="table table-hover align-middle w-100 mb-0">
                <thead>
                    <tr>
                        <th>Branch Name</th>
                        <th>Area</th>
                        <th class="text-center">Customers</th>
                        <th class="text-end">Deposit</th>
                        <th class="text-end">Total Balance</th>
                        <th class="text-end">Undue</th>
                        <th class="text-end">Overdue</th>
                        <th class="text-center">Action</th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content">
            <div class="modal-header px-4 py-3 shadow-sm z-3">
                <div class="d-flex align-items-center">
                    <i class="fa-solid fa-users text-secondary me-3 fs-5"></i>
                    <div>
                        <h5 class="modal-title mb-0" id="mBranchHeader">Branch Detail</h5>
                        <div class="small text-muted" style="font-size: 0.7rem;">CUSTOMER AGING ANALYSIS</div>
                    </div>
                </div>
                <div class="d-flex align-items-center gap-3">
                    <div id="custExportBtns"></div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
            </div>
            
            <div class="modal-body p-4 bg-light">
                <div class="card card-main">
                    <table id="customerTable" class="table table-hover align-middle w-100 mb-0" style="font-size: 0.8rem;">
                        <thead>
                            <tr>
                                <th>Code</th>
                                <th>Customer Name</th>
                                <th class="text-end">Deposit</th>
                                <th class="text-end">Total</th>
                                <th class="text-end">Undue</th>
                                <th class="text-end text-danger">Overdue</th>
                                <th class="text-end">1D</th><th class="text-end">2D</th><th class="text-end">3D</th>
                                <th class="text-end">4D</th><th class="text-end">5D</th><th class="text-end">6D</th>
                                <th class="text-end text-primary">7-30D</th>
                                <th class="text-end text-danger">30D+</th>
                            </tr>
                        </thead>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwA7MzcEy6DKirevQdBFWLOzKaxboATV1A_MkdgnoZUaiSjtU5_LXRGm5M9OgF38EVT/exec';
    let fullData = [];

    // ฟังก์ชันจัดรูปแบบตัวเลขสไตล์บัญชี
    function formatAcc(data) {
        let num = Number(data || 0);
        if (num === 0) return '<span class="text-zero">-</span>';
        if (num < 0) return `<span class="text-negative">${num.toLocaleString()}</span>`;
        return num.toLocaleString();
    }

    async function init() {
        try {
            const res = await fetch(API_URL, { redirect: 'follow' });
            fullData = await res.json();
            renderSummary(fullData);
            $('#loader').fadeOut();
        } catch (e) {
            console.error(e);
            alert('Data synchronization failed.');
        }
    }

    function renderSummary(data) {
        const groups = {};
        data.forEach(r => {
            if (!groups[r.branch]) {
                groups[r.branch] = { name: r.branch, area: r.area, custCount: 0, deposit: 0, total: 0, undue: 0, overdue: 0 };
            }
            groups[r.branch].custCount++;
            groups[r.branch].deposit += Number(r.deposit || 0);
            groups[r.branch].total += Number(r.total || 0);
            groups[r.branch].undue += Number(r.undue || 0);
            groups[r.branch].overdue += Number(r.overdue || 0);
        });

        $('#branchTable').DataTable({
            data: Object.values(groups),
            columns: [
                { data: 'name', className: 'fw-semibold text-primary', render: d => `<span style="cursor:pointer;" onclick="openDetail('${d}')">${d}</span>` },
                { data: 'area', className: 'text-muted' },
                { data: 'custCount', className: 'text-center' },
                { data: 'deposit', className: 'text-end', render: d => formatAcc(d) },
                { data: 'total', className: 'text-end fw-semibold', render: d => formatAcc(d) },
                { data: 'undue', className: 'text-end', render: d => formatAcc(d) },
                { data: 'overdue', className: 'text-end col-overdue', render: d => formatAcc(d) },
                { className: 'text-center', render: (d, t, r) => `<button class="btn btn-sm btn-outline-secondary py-1" onclick="openDetail('${r.name}')"><i class="fa-solid fa-arrow-right"></i></button>` }
            ],
            dom: '<"row"<"col-sm-12 col-md-6"B><"col-sm-12 col-md-6"f>>rt<"row"<"col-sm-12 col-md-5"i><"col-sm-12 col-md-7"p>>',
            buttons: [ { extend: 'excel', className: 'btn btn-sm btn-success', text: 'Export to Excel' } ],
            order: [[6, 'desc']]
        });
    }

    function openDetail(branchName) {
        const customers = fullData.filter(x => x.branch === branchName);
        $('#mBranchHeader').text(branchName);

        if ($.fn.DataTable.isDataTable('#customerTable')) {
            $('#customerTable').DataTable().clear().destroy();
        }

        const cTable = $('#customerTable').DataTable({
            data: customers,
            scrollY: '60vh', // เปิดการเลื่อนแนวตั้ง ล็อกหัวตารางไว้
            scrollX: true,   // เปิดการเลื่อนแนวนอน
            scrollCollapse: true,
            columns: [
                { data: 'customerCode', className: 'fw-medium text-muted' },
                { data: 'customerName', className: 'fw-medium' },
                { data: 'deposit', className: 'text-end', render: d => formatAcc(d) },
                { data: 'total', className: 'text-end fw-semibold', render: d => formatAcc(d) },
                { data: 'undue', className: 'text-end', render: d => formatAcc(d) },
                { data: 'overdue', className: 'text-end col-overdue', render: d => formatAcc(d) },
                { data: 'overdue1', className: 'text-end', render: d => formatAcc(d) },
                { data: 'overdue2', className: 'text-end', render: d => formatAcc(d) },
                { data: 'overdue3', className: 'text-end', render: d => formatAcc(d) },
                { data: 'overdue4', className: 'text-end', render: d => formatAcc(d) },
                { data: 'overdue5', className: 'text-end', render: d => formatAcc(d) },
                { data: 'overdue6', className: 'text-end', render: d => formatAcc(d) },
                { data: 'overdue7_30', className: 'text-end col-aging-mid', render: d => formatAcc(d) },
                { data: 'overdueOver30', className: 'text-end col-aging-high', render: d => formatAcc(d) }
            ],
            dom: '<"row"<"col-sm-12 col-md-6"l><"col-sm-12 col-md-6"f>>rt<"row"<"col-sm-12 col-md-5"i><"col-sm-12 col-md-7"p>>',
            buttons: [ { extend: 'excel', className: 'btn btn-sm btn-success', text: 'Download Data' } ],
            pageLength: 50,
            order: [[5, 'desc']]
        });

        $('#custExportBtns').empty();
        cTable.buttons().container().appendTo('#custExportBtns');
        
        // เปิด Modal
        const myModal = new bootstrap.Modal(document.getElementById('detailModal'));
        myModal.show();
    }

    // 🚨 จุดสำคัญ: สั่งคำนวณความกว้างตารางใหม่เมื่อ Modal เปิดเสร็จ 100% 🚨
    $('#detailModal').on('shown.bs.modal', function () {
        $('#customerTable').DataTable().columns.adjust();
    });

    init();
</script>
</body>
</html>
